.btn-text{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;letter-spacing:0.08em;text-transform:uppercase;color:#888;background:transparent;border:none;cursor:pointer;transition:color .2s;}

.project-row:hover{background:rgba(192,57,43,0.03);}
.project-row:hover .project-row-title{color:#C0392B;}
.project-row:hover .project-arrow{color:#C0392B;transform:translateX(4px);}
.project-row-left{flex:1;}
.project-row-head{display:flex;align-items:center;gap:12px;margin-bottom:0.4rem;flex-wrap:wrap;}
.project-row-title{font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:500;transition:color .2s;}
.project-badge{padding:2px 8px;border:1px solid #C0392B;font-family:'IBM Plex Mono',monospace;font-size:0.62rem;letter-spacing:0.08em;text-transform:uppercase;color:#C0392B;}
.project-row-desc{font-size:0.88rem;color:#666;font-weight:300;margin-bottom:0.5rem;max-width:650px;line-height:1.6;}

.skills-table td:last-child{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}

.carousel-slide{min-width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#EEE 0%,#F5F5F5 100%);position:relative;overflow:hidden;}
.carousel-slide img{width:100%;height:100%;object-fit:cover;display:block;}
.carousel-slide-placeholder{display:flex;flex-direction:column;align-items:center;gap:12px;}
.carousel-slide-placeholder svg{width:40px;height:40px;stroke:#CCC;fill:none;stroke-width:1;}
.carousel-slide-placeholder span{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#CCC;letter-spacing:0.06em;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:#fff;border:1px solid #DDD;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;color:#666;transition:all .2s;z-index:10;}
.carousel-btn:hover{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.carousel-btn-prev{left:12px;}
.carousel-btn-next{right:12px;}
.carousel-counter{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#aaa;position:absolute;top:12px;right:16px;}
.carousel-dots{display:flex;justify-content:center;gap:8px;padding:0.75rem 0 1.5rem;}

.cdot.active{background:#C0392B;}

  <div style="max-width:960px;margin:0 auto;padding:4rem 2.5rem;">
    <div class="section-eyebrow">Travaux</div>
    <div class="section-title">Projets</div>
    <div class="projects-list" id="projets-list"></div>
  </div>
</div>

<!-- COMPÉTENCES -->
<div class="view" id="view-competences">
  <div class="skills-wrap">
    <div class="section-eyebrow">Stack technique</div>
    <div class="section-title">Compétences</div>
    <table class="skills-table" id="skills-table"></table>
  </div>
</div>

<!-- PARCOURS -->
<div class="view" id="view-parcours">
  <div class="parcours-wrap">
    <div class="parcours-block">
      <div class="section-eyebrow">Expériences</div>
      <div class="section-title">Expériences professionnelles</div>
      <div class="parcours-list" id="exp-list"></div>
    </div>
    <div class="parcours-block">
      <div class="section-eyebrow">Formation</div>
      <div class="section-title">Parcours académique</div>
      <div class="parcours-list" id="formation-list"></div>
    </div>
  </div>
</div>

<!-- CONTACT -->
<div class="view" id="view-contact">
  <div class="contact-wrap">
    <div class="section-eyebrow">Me contacter</div>
    <div class="section-title">Contact</div>
    <div class="contact-items" id="contact-items"></div>
    <div class="contact-footer" id="contact-footer"></div>
  </div>
</div>

<!-- PROJET DÉTAIL -->
<div class="view" id="view-project">
  <div class="project-detail">
    <button class="project-back" onclick="goTo('projets')">← Tous les projets</button>
    <div class="project-detail-title-row">
      <span class="project-detail-title" id="det-titre"></span>
      <span class="project-badge" id="det-badge" style="display:none"></span>
    </div>
    <div class="project-detail-type" id="det-type"></div>
    <div class="detail-divider"></div>

    <!-- Carrousel -->
    <div class="carousel" id="det-carousel">
      <div class="carousel-track" id="carousel-track"></div>
      <button class="carousel-btn carousel-btn-prev" onclick="carouselPrev()">&#8592;</button>
      <button class="carousel-btn carousel-btn-next" onclick="carouselNext()">&#8594;</button>
      <div class="carousel-counter" id="carousel-counter"></div>
    </div>
    <div class="carousel-dots" id="carousel-dots"></div>

    <div class="detail-body">
      <div>
        <div class="detail-label">À propos</div>
        <p class="detail-about" id="det-apropos"></p>
        <div class="detail-label">Fonctionnalités</div>
        <ul class="detail-features" id="det-features"></ul>
      </div>
      <div>
        <div class="detail-label">Stack technique</div>
        <div class="detail-stack-grid" id="det-stack"></div>
        <div class="detail-label" style="margin-top:1.5rem">Liens</div>
        <div class="detail-links" id="det-links"></div>
      </div>
    </div>
    <div class="detail-retour">
      <button class="detail-retour-btn" onclick="goTo('projets')">← Retour aux projets</button>
    </div>
  </div>
</div>

<footer>
  <span id="footer-copy"></span>
  <span>Dakar, Sénégal</span>
</footer>

<script>
// ── STATE ──
let currentView = 'home';
let carouselIndex = 0;
let carouselImages = [];

// ── INIT ──
function init() {
  // Nav logo
  document.getElementById('nav-logo').textContent = ME.initiales;
  document.getElementById('nav-logo').onclick = () => goTo('home');

  // Hero
  document.getElementById('hero-prenom').textContent = ME.prenom;
  document.getElementById('hero-nom').textContent = ME.nom;
  document.getElementById('hero-titre').textContent = ME.titre;

  // Footer
  document.getElementById('footer-copy').textContent = `© 2025 ${ME.prenom} ${ME.nom} — Tous droits réservés`;

  // Projets lists
  renderProjectsList('home-projects-list');
  renderProjectsList('projets-list');

  // Skills
  renderSkills();

  // Parcours
  renderParcours();

  // Contact
  renderContact();
}

// ── NAVIGATION ──
function goTo(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  currentView = view;
  window.scrollTo(0, 0);

  const navBack = document.getElementById('nav-back');
  const navMain = document.getElementById('nav-main');
  if (view === 'project') {
    navBack.style.display = 'block';
    navMain.style.display = 'none';
  } else {
    navBack.style.display = 'none';
    navMain.style.display = 'flex';
  }
}

function goBack() {
  goTo('projets');
}

// ── PROJETS LIST ──
function renderProjectsList(containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = PROJETS.map(p => `
    <div class="project-row" onclick="showProject('${p.id}')">
      <div class="project-row-left">
        <div class="project-row-head">
          <span class="project-row-title">${p.titre}</span>
          ${p.badge ? `<span class="project-badge">${p.badge}</span>` : ''}
        </div>
        <p class="project-row-desc">${p.descCourte}</p>
        <div class="project-row-stack">${p.stack.map(s => `<span>${s}</span>`).join('')}</div>
      </div>
      <span class="project-arrow">→</span>
    </div>
  `).join('');
}

// ── PROJET DÉTAIL ──
function showProject(id) {
  const p = PROJETS.find(x => x.id === id);
  if (!p) return;

  document.getElementById('det-titre').textContent = p.titre;
  const badge = document.getElementById('det-badge');
  if (p.badge) { badge.textContent = p.badge; badge.style.display = 'inline'; }
  else badge.style.display = 'none';
  document.getElementById('det-type').textContent = p.type;
  document.getElementById('det-apropos').textContent = p.apropos;
  document.getElementById('det-features').innerHTML = p.fonctionnalites
    .map(f => `<li><span class="feat-dash">—</span><span>${f}</span></li>`).join('');
  document.getElementById('det-stack').innerHTML = p.stack
    .map(s => `<span class="detail-stack-pill">${s}</span>`).join('');
  document.getElementById('det-links').innerHTML = `
    <a class="detail-link" href="${p.github}" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      Code source
    </a>`;

  // Carrousel
  carouselImages = p.images && p.images.length > 0 ? p.images : [];
  carouselIndex = 0;
  renderCarousel();

  goTo('project');
}

function renderCarousel() {
  const track = document.getElementById('carousel-track');
  const dots = document.getElementById('carousel-dots');
  const counter = document.getElementById('carousel-counter');

  if (carouselImages.length === 0) {
    track.innerHTML = `
      <div class="carousel-slide">
        <div class="carousel-slide-placeholder">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Captures d'écran à venir</span>
        </div>
      </div>`;
    dots.innerHTML = '';
    counter.textContent = '';
    document.querySelector('.carousel-btn-prev').style.display = 'none';
    document.querySelector('.carousel-btn-next').style.display = 'none';
    return;
  }

  document.querySelector('.carousel-btn-prev').style.display = 'flex';
  document.querySelector('.carousel-btn-next').style.display = 'flex';

  track.innerHTML = carouselImages.map(src =>
    `<div class="carousel-slide"><img src="${src}" alt="Screenshot"/></div>`
  ).join('');

  dots.innerHTML = carouselImages.map((_, i) =>
    `<div class="cdot ${i === 0 ? 'active' : ''}" onclick="carouselGoto(${i})"></div>`
  ).join('');

  updateCarousel();
}

function updateCarousel() {
  document.getElementById('carousel-track').style.transform = `translateX(-${carouselIndex * 100}%)`;
  document.querySelectorAll('.cdot').forEach((d, i) => d.classList.toggle('active', i === carouselIndex));
  document.getElementById('carousel-counter').textContent =
    carouselImages.length > 0 ? `${carouselIndex + 1} / ${carouselImages.length}` : '';
}

function carouselPrev() {
  carouselIndex = (carouselIndex - 1 + carouselImages.length) % carouselImages.length;
  updateCarousel();
}

function carouselNext() {
  carouselIndex = (carouselIndex + 1) % carouselImages.length;
  updateCarousel();
}

function carouselGoto(i) {
  carouselIndex = i;
  updateCarousel();
}

// ── SKILLS ──
function renderSkills() {
  document.getElementById('skills-table').innerHTML = COMPETENCES.map(c => `
    <tr>
      <td>${c.cat}</td>
      <td>${c.items.map(i => `<span class="skill-pill">${i}</span>`).join('')}</td>
    </tr>`).join('');
}

// ── PARCOURS ──
function renderParcours() {
  document.getElementById('exp-list').innerHTML = EXPERIENCES.map(e => `
    <div class="parcours-item">
      <div>
        <div class="parcours-date">${e.date}</div>
        <div class="parcours-org">${e.org}</div>
      </div>
      <div>
        <div class="parcours-title">${e.titre}</div>
        <p class="parcours-desc">${e.desc}</p>
      </div>
    </div>`).join('');

  document.getElementById('formation-list').innerHTML = FORMATIONS.map(f => `
    <div class="parcours-item">
      <div>
        <div class="parcours-date">${f.date}</div>
        <div class="parcours-org">${f.org}</div>
      </div>
      <div>
        <div class="parcours-title">${f.titre}</div>
      </div>
    </div>`).join('');
}

// ── CONTACT ──
function renderContact() {
  document.getElementById('contact-items').innerHTML = `
    <a class="contact-item" href="mailto:${ME.email}">
      <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      ${ME.email}
    </a>
    <a class="contact-item" href="tel:${ME.telephone}">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.77a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      ${ME.telephone}
    </a>
    <a class="contact-item" href="${ME.githubUrl}" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      ${ME.github}
    </a>
    <a class="contact-item" href="${ME.linkedinUrl}" target="_blank">
      <svg viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      ${ME.linkedin}
    </a>`;

  document.getElementById('contact-footer').textContent =
    `© 2025 ${ME.prenom} ${ME.nom} — Tous droits réservés`;
}

// ── LANCEMENT ──
init();
</script>
</body>
</html>
